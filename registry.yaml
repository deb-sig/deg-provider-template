version: 1
templates:
  - id: alipay
    name: 支付宝账单
    category: payment
    tags:
      - 支付
      - 电商
      - 购物
      - 中国大陆
    latest: "2026-05-23"
    versions:
      - "2026-05-23"
    path: templates/alipay/latest.yaml
    starterRules: rules/alipay/example.yaml
    description: 支付宝 CSV 账单模板。import alipay 使用 latest；历史格式使用 alipay@YYYY-MM-DD。

  - id: wechat
    name: 微信支付账单
    category: payment
    tags:
      - 支付
      - 社交
      - 购物
      - 中国大陆
    latest: "2026-04-28"
    versions:
      - "2026-04-28"
    path: templates/wechat/latest.yaml
    starterRules: rules/wechat/example.yaml
    description: 微信支付账单模板。import wechat 使用 latest；历史格式使用 wechat@YYYY-MM-DD。
