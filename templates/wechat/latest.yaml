schema: deg.import.v1
id: wechat
name: 微信支付账单

template:
  fileFormat: csv
  delimiter: ","
  skipLeadingRows: 16
  dateFormat: yyyy-MM-dd HH:mm:ss
  amountPrefix: "¥"
  defaultMinusAccount: Assets:FIXME
  defaultPlusAccount: Expenses:FIXME
  defaultCurrency: CNY
  sourceHeaders:
    - 交易时间
    - 交易类型
    - 交易对方
    - 商品
    - 收/支
    - 金额(元)
    - 支付方式
    - 当前状态
    - 交易单号
    - 商户单号
    - 备注
  columns:
    date: 交易时间
    amount: 金额(元)
    payee: 交易对方
    narration: 商品
    type: 收/支
templateRules:
  - id: 微信支出
    name: 支出
    when: raw[收/支] == "支出"
    actions:
      type: send
      from: Assets:FIXME
      to: Expenses:FIXME

  - id: 微信收入
    name: 收入
    when: raw[收/支] == "收入"
    actions:
      type: recv
      from: Income:FIXME
      to: Assets:FIXME

  - id: 微信中性交易
    name: /
    when: raw[收/支] == "/"
    actions:
      ignore: true
